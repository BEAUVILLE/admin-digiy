<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DIGIY Backoffice</title>
<meta name="theme-color" content="#0a0e1a" />
<style>
:root{--bg:#0a0e1a;--card:#111827;--text:#e5e7eb;--muted:#9ca3af;--accent:#facc15;}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:linear-gradient(135deg,#0a0e1a,#1a1f2e);color:var(--text);font-family:system-ui;padding:24px}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.btn{background:linear-gradient(135deg,#facc15,#eab308);border:0;padding:10px 14px;border-radius:12px;font-weight:900;color:#0a0e1a;text-decoration:none}
.card{background:rgba(17,24,39,.9);padding:18px;border-radius:16px;border:1px solid rgba(148,163,184,.2);margin-top:14px}
.small{color:var(--muted);font-size:13px;font-weight:700}
</style>
</head>
<body>

<div class="top">
  <div>
    <h1>DIGIY Backoffice</h1>
    <div class="small">Cockpit global · Paiement direct · 0% commission</div>
  </div>
  <a class="btn" href="activations.html">🔑 Activations</a>
</div>

<div class="card">
  <div class="small">Admin connecté</div>
  <div style="font-weight:900;font-size:18px;margin-top:6px" id="adminLabel">—</div>
</div>

<script>
const BACKEND = "https://apps.digiylyfe.com";

const KEY = {
  token: "digiy_admin_token",
  exp:   "digiy_admin_exp",
  role:  "digiy_admin_role",
  label: "digiy_admin_label"
};

function logout() {
  Object.values(KEY).forEach(k => localStorage.removeItem(k));
  location.replace("login.html");
}

function hasLocalToken() {
  const tok = (localStorage.getItem(KEY.token) || "").trim();
  const exp = Number(localStorage.getItem(KEY.exp) || "0");
  return !!tok && Date.now() < exp;
}

async function serverCheck(tok) {
  // Vérifie côté backend que le token est accepté
  const r = await fetch(`${BACKEND}/api/admin/check`, {
    headers: { "Authorization": `Bearer ${tok}` }
  });
  // 200 = OK, 401 = KO
  return r.ok;
}

(async () => {
  if (!hasLocalToken()) return logout();

  const tok = localStorage.getItem(KEY.token);

  try {
    const ok = await serverCheck(tok);
    if (!ok) return logout();
  } catch (e) {
    // Si réseau down, on peut soit bloquer soit tolérer.
    // Ici: on bloque pour éviter l'accès "offline".
    return logout();
  }

  // Affichage admin
  document.getElementById("adminLabel").textContent =
    localStorage.getItem(KEY.label) || "OPS";
})();
</script>
</body>
</html>
