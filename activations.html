<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DIGIY — Activations</title>
<meta name="theme-color" content="#0a0e1a" />
<style>
:root{--bg:#0a0e1a;--card:#111827;--text:#e5e7eb;--muted:#9ca3af;--accent:#facc15;}
body{margin:0;min-height:100vh;background:linear-gradient(135deg,#0a0e1a,#1a1f2e);color:var(--text);font-family:system-ui;padding:24px}
.card{background:rgba(17,24,39,.9);padding:20px;border-radius:16px;border:1px solid rgba(148,163,184,.2);max-width:600px;margin:auto}
label{display:block;margin-top:12px;font-weight:800;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.06em}
input,select{width:100%;padding:12px;border-radius:12px;border:1px solid rgba(148,163,184,.3);background:#0f172a;color:white;font-weight:800}
.btn{margin-top:16px;width:100%;padding:14px;border-radius:12px;border:0;background:linear-gradient(135deg,#facc15,#eab308);font-weight:900;color:#0a0e1a;cursor:pointer}
.btn:disabled{opacity:.65;cursor:not-allowed}
.msg{margin-top:12px;font-weight:900;line-height:1.35}
a{color:#facc15;text-decoration:none;font-weight:900}
.small{color:var(--muted);font-size:12px;font-weight:800;margin-top:6px}
</style>
</head>
<body>

<div class="card">
  <h2>🔑 Activation manuelle</h2>
  <div class="small">Astuce : ABOS peut pré-remplir cette page via URL (phone/module/amount/ref).</div>

  <label>Téléphone</label>
  <input id="phone" placeholder="22177..." />

  <label>Module</label>
  <select id="module">
    <option value="DRIVER">DRIVER</option>
    <option value="POS">POS</option>
    <option value="RESTO">RESTO</option>
    <option value="LOC">LOC</option>
    <option value="MARKET">MARKET</option>
    <option value="JOBS">JOBS</option>
    <option value="BUILD">BUILD</option>
  </select>

  <label>Plan</label>
  <select id="plan">
    <option value="standard">standard</option>
    <option value="pro">pro</option>
  </select>

  <label>Montant (FCFA)</label>
  <input id="amount" placeholder="12900" inputmode="numeric" />

  <label>Note / Référence (Wave / Ref)</label>
  <input id="note" placeholder="ex: manual_WAVE_20260227_001 / Wave reçu 10k / LOC / Saly" />

  <button id="go" class="btn">✅ Activer</button>

  <div class="msg" id="msg"></div>

  <div style="margin-top:14px">
    <a href="index.html">← Retour cockpit</a>
  </div>
</div>

<script>
/* ✅ PREFILL ABOS → ACTIVATIONS (à coller avant les const) */
(() => {
  const qp = new URLSearchParams(location.search);

  const phone = (qp.get("phone") || qp.get("tel") || "").trim();
  const module = (qp.get("module") || "").trim().toUpperCase();
  const plan   = (qp.get("plan") || "").trim().toLowerCase();
  const amount = (qp.get("amount") || qp.get("amount_xof") || "").trim();
  const note   = (qp.get("note") || qp.get("payment_ref") || qp.get("ref") || "").trim();

  if (phone)  document.getElementById("phone").value = phone;
  if (amount) document.getElementById("amount").value = amount;
  if (note)   document.getElementById("note").value = note;

  if (module) {
    const el = document.getElementById("module");
    const ok = Array.from(el.options).some(o => o.value === module);
    if (ok) el.value = module;
  }

  if (plan) {
    const el = document.getElementById("plan");
    const ok = Array.from(el.options).some(o => o.value === plan);
    if (ok) el.value = plan;
  }
})();

/* ✅ CONFIG */
const BACKEND = "https://apps.digiylyfe.com";
const token = (localStorage.getItem("digiy_admin_token") || "").trim();

if(!token){
  location.replace("login.html");
}

const $ = (id) => document.getElementById(id);
const btn = $("go");
const msg = $("msg");

function setMsg(text, color){
  msg.textContent = text || "";
  msg.style.color = color || "#e5e7eb";
}

btn.onclick = async () => {
  const phone = $("phone").value.trim();
  const module = $("module").value;
  const plan = $("plan").value;
  const amount = Number(($("amount").value || "0").trim());
  const note = $("note").value.trim();

  if(!phone || phone.length < 9) return setMsg("❌ Téléphone invalide.", "red");
  if(!amount || amount < 100)    return setMsg("❌ Montant invalide.", "red");

  btn.disabled = true;
  setMsg("⏳ Activation...", "#facc15");

  try{
    const r = await fetch(`${BACKEND}/api/admin/activate`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
      },
      body: JSON.stringify({
        phone,
        module,
        plan,
        amount_xof: amount,
        note,                 // ✅ on envoie la note/ref
        payment_ref: note     // ✅ au cas où ton backend attend payment_ref
      })
    });

    const data = await r.json().catch(()=>({ok:false,error:"bad_json"}));

    if(r.status === 401){
      setMsg("🔒 Session expirée. Reconnecte-toi.", "red");
      btn.disabled = false;
      setTimeout(()=>location.replace("login.html"), 350);
      return;
    }

    if(!r.ok || !data.ok){
      setMsg("❌ " + (data.error || `Erreur (${r.status})`), "red");
      btn.disabled = false;
      return;
    }

    setMsg("✅ Activation réussie", "limegreen");
    btn.disabled = false;

  }catch(e){
    setMsg("⚠️ Erreur réseau (fetch).", "red");
    btn.disabled = false;
  }
};
</script>

</body>
</html>
