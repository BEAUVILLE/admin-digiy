<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>DIGIY — Activation</title>
<style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:linear-gradient(135deg,#0a0e1a,#1a1f2e);color:#e5e7eb;font-family:system-ui,-apple-system,Segoe UI,sans-serif;padding:18px}.wrap{max-width:840px;margin:auto}.card{background:#111827ee;border:1px solid #334155;border-radius:22px;padding:20px}h1{margin:0 0 8px}.small{color:#9ca3af;font-weight:800;line-height:1.45}.notice{margin:12px 0;padding:12px;border-radius:16px;background:#facc1514;border:1px solid #facc1544;color:#fde68a;font-weight:850;line-height:1.45}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}label{display:block;margin-top:12px;color:#9ca3af;font-size:12px;font-weight:950;text-transform:uppercase;letter-spacing:.06em}input,select,textarea{width:100%;padding:14px;border-radius:14px;border:1px solid #475569;background:#0f172a;color:white;font-weight:900}textarea{min-height:115px}.btn{margin-top:15px;width:100%;padding:15px;border:0;border-radius:15px;background:linear-gradient(135deg,#facc15,#eab308);color:#0a0e1a;font-weight:1000;font-size:1rem}.btn:disabled{opacity:.55}.btn2{background:#ffffff12;color:#e5e7eb;border:1px solid #475569}.quick{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.quick .btn{font-size:12px;padding:10px}.msg{white-space:pre-wrap;margin-top:12px;font-weight:950;line-height:1.4}.meta{margin-top:10px;color:#cbd5e1;font-size:13px;font-weight:850;line-height:1.45}.hide{display:none}.link{display:inline-block;margin-top:16px;color:#facc15;font-weight:950;text-decoration:none}@media(max-width:720px){.grid,.quick{grid-template-columns:1fr}body{padding:12px}}
</style>
</head>
<body><div class="wrap"><div class="card">
<h1>🔑 Activation manuelle</h1>
<div class="small">Catalogue réel Supabase : DRIVER, LOC, EXPLORE BOOST, RÉSEAU. ABOS/PAY restent des rails internes.</div>
<div class="notice">Ne pas inventer les plans : le bouton envoie exactement <b>module + plan_code + amount_xof</b>.</div>
<div class="grid"><div><label>Téléphone</label><input id="phone" inputmode="numeric" placeholder="22177..."></div><div><label>Module</label><select id="module"></select></div></div>
<div class="grid"><div><label>Plan</label><select id="plan"></select></div><div><label>Montant FCFA</label><input id="amount" inputmode="numeric"></div></div>
<div id="manual" class="grid hide"><div><label>Plan manuel</label><input id="manualPlan" placeholder="plan_code Supabase"></div><div><label>Durée jours</label><input id="days" inputmode="numeric" placeholder="30"></div></div>
<div id="meta" class="meta"></div>
<label>Note / Référence</label><textarea id="note"></textarea>
<div class="quick" id="quick"></div>
<button id="go" class="btn">✅ Activer via backend</button>
<div id="msg" class="msg"></div>
<a class="link" href="index.html">← Retour cockpit</a>
</div></div>
<script>
(()=>{const BACKEND=location.hostname==='localhost'?'http://localhost:8000':'https://admin.digiylyfe.com';const STORE={token:'digiy_admin_jwt',exp:'digiy_admin_exp'};const $=id=>document.getElementById(id);const msg=$('msg'),go=$('go');
const C={
DRIVER:[['driver_jakarta','DRIVER · Jakarta',5500,30,1],['driver_bus','DRIVER · Bus',12000,30,1],['driver_pro','DRIVER · Driver',19900,30,1]],
LOC:[['loc_essentiel','LOC · Essentiel 1 à 5',26000,30,1],['loc_standard','LOC · Standard 6 à 9',35000,30,1]],
EXPLORE_BOOST:[['explore_boost_standard','EXPLORE BOOST · Standard',10000,30,1]],
RESEAU_DIGIY:[['reseau_7j','RÉSEAU DIGIY · Publication 7 jours',15000,7,1],['reseau_15j','RÉSEAU DIGIY · Publication 15 jours',25000,15,1],['reseau_30j','RÉSEAU DIGIY · Publication 30 jours',45000,30,1],['reseau_first','RÉSEAU DIGIY · Mise en classe FIRST',150000,30,1]],
ABOS:[['abos_orchestrateur','ABOS · Préparation abonnement',null,null,0]],
PAY:[['pay_caisse_centrale','PAY · Mon argent · Caisse centrale',null,null,0]],
POS:[],MARKET:[],RESA:[],RESTO:[],BUILD:[],JOBS:[],EXPLORE:[]};
const L={DRIVER:'DRIVER',LOC:'LOC',EXPLORE_BOOST:'EXPLORE BOOST',RESEAU_DIGIY:'RÉSEAU DIGIY',POS:'POS / MON COMMERCE',MARKET:'MARKET',RESA:'RESA',RESTO:'RESTO',BUILD:'BUILD',JOBS:'JOBS',EXPLORE:'EXPLORE',ABOS:'ABOS · rail interne',PAY:'PAY · rail interne'};
function d(v){return String(v||'').replace(/[^\d]/g,'')}function np(v){return String(v||'').trim().toLowerCase().replace(/-/g,'_')}function nm(v){return String(v||'').trim().toUpperCase().replace(/-/g,'_')}function money(v){return v==null?'—':Number(v).toLocaleString('fr-FR')+' FCFA'}function sm(t,c){msg.textContent=t||'';msg.style.color=c||'#e5e7eb'}function tok(){let t=(localStorage.getItem(STORE.token)||'').trim(),e=Number(localStorage.getItem(STORE.exp)||'0');if(!t||(e&&Date.now()>e)){localStorage.removeItem(STORE.token);location.replace('login.html');return ''}return t}
function plans(){return C[$('module').value]||[]}function cur(){let c=np($('plan').value);return plans().find(p=>p[0]===c)||null}function byAmount(m,a){return (C[m]||[]).find(p=>Number(p[2])===Number(a))||null}
function init(){let order=['DRIVER','LOC','EXPLORE_BOOST','RESEAU_DIGIY','POS','MARKET','RESA','RESTO','BUILD','JOBS','EXPLORE','ABOS','PAY'];$('module').innerHTML=order.map(m=>'<option value="'+m+'">'+(L[m]||m)+'</option>').join('');$('quick').innerHTML=[['DRIVER','driver_jakarta','DRIVER Jakarta'],['DRIVER','driver_bus','DRIVER Bus'],['DRIVER','driver_pro','DRIVER Pro'],['LOC','loc_essentiel','LOC Essentiel'],['LOC','loc_standard','LOC Standard'],['EXPLORE_BOOST','explore_boost_standard','EXPLORE Boost'],['RESEAU_DIGIY','reseau_7j','Réseau 7j'],['RESEAU_DIGIY','reseau_first','FIRST']].map(q=>'<button class="btn btn2" type="button" data-m="'+q[0]+'" data-p="'+q[1]+'">'+q[2]+'</button>').join('');document.querySelectorAll('[data-m]').forEach(b=>b.onclick=()=>{ $('module').value=b.dataset.m;refresh();$('plan').value=b.dataset.p;sync();});refresh()}
function refresh(){let ps=plans();if(ps.length){$('manual').classList.add('hide');$('plan').innerHTML=ps.map(p=>'<option value="'+p[0]+'">'+p[1]+' · '+money(p[2])+(p[3]?' · '+p[3]+'j':'')+'</option>').join('')}else{$('manual').classList.remove('hide');$('plan').innerHTML='<option value="manual">Plan manuel / non catalogué</option>'}sync()}
function sync(){let p=cur(),m=$('module').value;if(p){if(p[2]!=null)$('amount').value=String(p[2]);if(p[3]!=null)$('days').value=String(p[3]);$('meta').innerHTML='Module : <b>'+m+'</b> · Plan envoyé : <b>'+p[0]+'</b> · Montant : <b>'+money(p[2])+'</b> · Durée : <b>'+(p[3]||'—')+'j</b>'+(p[4]?'':'<br>⚠️ Rail interne non activable ici.');if(!$('note').value.trim()||$('note').value.includes('Plan pro'))$('note').value=m+' · '+p[1]+' · '+money(p[2])+' · preuve à vérifier';go.disabled=!p[4];return}$('meta').innerHTML='⚠️ Aucun plan actif connu pour ce module. Le plan manuel ne passera que si la ligne existe dans Supabase.';go.disabled=false}
function prefill(){let q=new URLSearchParams(location.search),ph=q.get('phone')||q.get('tel')||'',m=nm(q.get('module')||''),p=np(q.get('plan')||''),a=d(q.get('amount')||q.get('amount_xof')||''),n=q.get('note')||q.get('payment_ref')||q.get('ref')||'';if(ph)$('phone').value=d(ph);if(a)$('amount').value=a;if(n)$('note').value=n;if(C[m])$('module').value=m;refresh();if(p&&Array.from($('plan').options).some(o=>o.value===p))$('plan').value=p;else if(p&&!plans().length)$('manualPlan').value=p;else if(m&&a){let found=byAmount(m,a);if(found)$('plan').value=found[0]}sync();try{let u=new URL(location.href);['phone','tel','module','plan','amount','amount_xof','note','payment_ref','ref'].forEach(k=>u.searchParams.delete(k));history.replaceState({},document.title,u.pathname+u.search+u.hash)}catch(e){}}
function payloadPlan(){let p=cur();return p?p[0]:(np($('manualPlan').value)||np($('plan').value))}
init();prefill();$('module').onchange=refresh;$('plan').onchange=sync;$('amount').oninput=()=>{$('amount').value=d($('amount').value);sync()};$('phone').oninput=()=>{$('phone').value=d($('phone').value)};let token=tok();if(!token)return;
go.onclick=async()=>{let phone=d($('phone').value),module=$('module').value,plan=payloadPlan(),amount=Number(d($('amount').value)||0),note=$('note').value.trim(),p=cur(),days=Number(d($('days').value)||p?.[3]||0);if(!phone||phone.length<9)return sm('❌ Téléphone invalide.','red');if(!plan||plan==='manual')return sm('❌ Plan invalide.','red');if(!amount||amount<100)return sm('❌ Montant invalide ou plan sans prix. ABOS/PAY ne passent pas ici.','red');if(p&&p[4]===0)return sm('❌ Rail interne non activable ici : '+p[1],'red');go.disabled=true;sm('⏳ Activation...\nModule : '+module+'\nPlan envoyé : '+plan+'\nMontant : '+amount,'#facc15');let payload={phone,module,plan,amount_xof:amount,note,payment_ref:note};if(module==='RESEAU_DIGIY'){payload.reseau_digiy=true;payload.duration_days=days||7;payload.activation_scope=plan==='reseau_first'?'first':'validated_pro_visibility'}try{let r=await fetch(BACKEND+'/api/admin/activate',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},credentials:'include',body:JSON.stringify(payload)}),data=await r.json().catch(()=>({ok:false,error:'bad_json'}));if(r.status===401){sm('🔒 Session expirée.','red');setTimeout(()=>location.replace('login.html'),350);return}if(!r.ok||!data.ok){sm('❌ '+(data.error||'Erreur '+r.status)+'\nModule : '+module+'\nPlan envoyé : '+plan+'\nMontant : '+amount,'red');go.disabled=false;return}sm('✅ Activation réussie\nModule : '+module+'\nPlan : '+plan+'\nMontant : '+amount+' FCFA','limegreen');go.disabled=false}catch(e){sm('⚠️ Erreur réseau.','red');go.disabled=false}};
})();
</script></body></html>
